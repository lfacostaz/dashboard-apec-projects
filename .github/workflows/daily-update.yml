name: daily APEC dashboard update

on:
  schedule:
    # 6:15 AM Peru time = 11:15 UTC
    - cron: "15 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-apec-dashboard-update
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: sync with remote main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: run APEC scraper
        run: |
          python script/web-scraping-apec-pdb.py

      - name: set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: install Ubuntu system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libuv1-dev \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libpng-dev

      - name: install R packages
        run: |
          Rscript -e 'packages <- c(
            "shiny",
            "rmarkdown",
            "rio",
            "readxl",
            "readr",
            "DT",
            "dplyr",
            "stringr",
            "plotly",
            "bslib",
            "paletteer",
            "rlang",
            "tidyr",
            "fontawesome",
            "fishualize",
            "RColorBrewer",
            "rsconnect"
          ); install.packages(packages); missing <- packages[!vapply(packages, requireNamespace, logical(1), quietly = TRUE)]; if (length(missing)) stop("Missing R packages: ", paste(missing, collapse = ", "))'

      - name: render dashboard
        run: |
          quarto render dashboard/dashboard-apec-projects.qmd

      - name: commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/apec_approved_projects.csv
          git add data/apec_approved_projects.xlsx
          git add dashboard/apec_approved_projects.xlsx
          git add dashboard/dashboard-apec-projects.html || true
          git add dashboard/dashboard-apec-projects_files/ || true

          git status --short

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "daily APEC dashboard update"
          git push origin main

      - name: deploy with rsconnect
        env:
          SHINYAPPS_ACCOUNT: ${{ secrets.SHINYAPPS_ACCOUNT }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          Rscript -e 'rsconnect::setAccountInfo(
            name = Sys.getenv("SHINYAPPS_ACCOUNT"),
            token = Sys.getenv("SHINYAPPS_TOKEN"),
            secret = Sys.getenv("SHINYAPPS_SECRET"),
            server = "shinyapps.io"
          )'

          Rscript -e 'rsconnect::deployApp(
            appDir = "dashboard",
            appPrimaryDoc = "dashboard-apec-projects.qmd",
            appName = "dashboard-apec-projects",
            account = Sys.getenv("SHINYAPPS_ACCOUNT"),
            server = "shinyapps.io",
            forceUpdate = TRUE
          )'